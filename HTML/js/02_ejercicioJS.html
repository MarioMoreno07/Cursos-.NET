<!--EJERCICIO 2 - ARRAY DE LIBROS Y TABLA DINÁMICA

Objetivo:
Generar una tabla HTML a partir de un array JavaScript.

Tareas:
1. Crear un array de libros con al menos 4 objetos.
2. Cada libro debe tener id, titulo, autor, categoria, anio y disponible.
3. Crear una tabla Bootstrap vacía.
4. Rellenar el tbody dinámicamente con JavaScript.
5. Mostrar "Sí" o "No" según el valor de disponible.
6. Usar badges de Bootstrap.

Relación con Angular:
Este ejercicio prepara al alumno para entender *ngFor.-->

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tabla de Libros</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h2 class="mb-4">Lista de Libros</h2>
    <table class="table">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Título</th>
          <th>Autor</th>
          <th>Categoría</th>
          <th>Año</th>
          <th>Disponible</th>
        </tr>
      </thead>
      <tbody id="tablaLibros">
      </tbody>
    </table>
  </div>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
  <script>
    const libros = [
      { id: 1, titulo: "Dune", autor: "Marco", categoria: "Ciencia Ficcion", anio: 1967, disponible: true },
      { id: 2, titulo: "Piratas del caribe", autor: "Desconocido", categoria: "Aventura", anio: 1949, disponible: false },
      { id: 3, titulo: "El principito", autor: "Antonio", categoria: "Fábula", anio: 1943, disponible: true },
      { id: 4, titulo: "Don Quijote de la Mancha", autor: "Miguel de Cervantes", categoria: "Clásico", anio: 1605, disponible: false }
    ];

    const tbody = document.getElementById("tablaLibros");

    libros.forEach(libro => {
      const fila = document.createElement("tr");
      const disponibleTexto = libro.disponible ? "Sí" : "No";
      const badgeClase = libro.disponible ? "bg-success" : "bg-danger";

      fila.innerHTML = `
        <td>${libro.id}</td>
        <td>${libro.titulo}</td>
        <td>${libro.autor}</td>
        <td>${libro.categoria}</td>
        <td>${libro.anio}</td>
        <td><span class="badge ${badgeClase}">${disponibleTexto}</span></td>
        `;
        tbody.appendChild(fila);
    });
  </script>

</body>
</html>
