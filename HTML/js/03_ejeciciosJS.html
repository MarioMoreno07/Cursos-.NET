<!--EJERCICIO 3 - FORMULARIO DE LIBROS CON JAVASCRIPT

Objetivo:
Leer los datos de un formulario y añadir un libro a la tabla sin recargar la página.

Tareas:
1. Crear un formulario Bootstrap para libros.
2. Leer los valores de título, autor, categoría y año.
3. Validar que ningún campo esté vacío.
4. Crear un objeto libro.
5. Añadirlo al array de libros.
6. Volver a pintar la tabla.
7. Limpiar el formulario tras guardar.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>

<body>
    <form action="#" method="post" id="formLibro">
        <div class="col-md-3">
            <label for="titulo" class="form-label">Titulo</label>
            <input type="text" name="titulo" id="titulo" class="form-control" required>

        </div>
        <div class="col-md-3">
            <label for="autor" class="form-label">Autor</label>
            <input type="text" class="form-control" id="autor" name="autor" required>
        </div>
        <div class="col-md-3">
            <label for="categoria" class="form-label">Categoria</label>
            <input type="text" class="form-control" id="categoria" name="categoria" required>
        </div>
        <div class="col-md-3">
            <label for="anio" class="form-label">Año</label>
            <input type="number" class="form-control" id="anio" name="anio" required min="1400" max="2026">
        </div>
        <div class="col-md-3">
             <button type="submit" class="btn btn-primary">Enviar</button>
        </div>
    </form>

    <table class="table">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Categoría</th>
                <th>Año</th>
                <th>Disponible</th>
            </tr>
        </thead>
        <tbody id="tablaLibros">
        </tbody>
    </table>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
    </script>
    <script>
    const formulario = document.getElementById("formLibro");
    let libros = [];

    formulario.addEventListener("submit", function (e) {
        e.preventDefault();

        const titulo = document.getElementById("titulo").value.trim();
        const autor = document.getElementById("autor").value.trim();
        const categoria = document.getElementById("categoria").value.trim();
        const anio = document.getElementById("anio").value.trim();

        if (!titulo || !autor || !categoria || !anio) {
            alert("Todos los campos son obligatorios");
            return;
        }

        const libro = {
            id: libros.length + 1,
            titulo,
            autor,
            categoria,
            anio,
            disponible: true
        };

        libros.push(libro);
        pintarTabla();
        formulario.reset();
    });

    function pintarTabla() {
        const tbody = document.getElementById("tablaLibros");
        tbody.innerHTML = "";

        libros.forEach(libro => {
            const fila = `
            <tr>
                <td>${libro.id}</td>
                <td>${libro.titulo}</td>
                <td>${libro.autor}</td>
                <td>${libro.categoria}</td>
                <td>${libro.anio}</td>
                <td>${libro.disponible ? "Sí" : "No"}</td>
            </tr>
            `;
            tbody.innerHTML += fila;
        });
    }
</script>
</body>

</html>
