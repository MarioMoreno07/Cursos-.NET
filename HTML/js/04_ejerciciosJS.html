Objetivo:
Filtrar libros en memoria usando JavaScript.

Tareas:
1. Añadir un input de búsqueda.
2. Buscar por título o autor.
3. Añadir un select para filtrar por disponibilidad.
4. Repintar la tabla al cambiar filtros.

GET /api/v1/libros?q=...&disponible=true-->

        function buscar() {
            const titulo = document.getElementById("busquedaTitulo").value.toLowerCase().trim();
            const autor = document.getElementById("busquedaAutor").value.toLowerCase().trim();
            const disponibilidad = document.getElementById("disponibilidad").value;

            let resultado = libros;            
            if (titulo !== "") {
                resultado = resultado.filter(l =>l.titulo.toLowerCase().includes(titulo));
            }

            if (autor !== "") {
                resultado = resultado.filter(l =>l.autor.toLowerCase().includes(autor));
            }
            if (disponibilidad === "disponibles") {
                resultado = resultado.filter(l => l.disponible === "Sí");
            }

            if (disponibilidad === "no_disponibles") {
                resultado = resultado.filter(l => l.disponible === "No");
            }

            if (resultado.length === 0) {
                document.getElementById("tablaLibros").innerHTML =
                    `<tr><td>No hay resultados</td></tr>`;
            } else {
                cargarLibrosBusqueda(resultado);
            }
        }



        function cargarLibrosBusqueda(libroBuscado) {
            const tbody = document.getElementById("tablaLibros");
            tbody.innerHTML = ""
            libroBuscado.forEach(libro => {
                const fila = `      
            <tr>
                <td>${libro.id}</td>
                <td>${libro.titulo}</td>
                <td>${libro.autor}</td>
                <td>${libro.categoria}</td>
                <td>${libro.anio}</td>
                <td>${libro.disponible}</td>
            </tr>
            `;
                tbody.innerHTML += fila;
            });

        }

        function pintarTabla() {
            const tbody = document.getElementById("tablaLibros");
            tbody.innerHTML = "";

            libros.forEach(libro => {
