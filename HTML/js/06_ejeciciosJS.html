<!--EJERCICIO 6 - LOGIN JWT CON FETCH

Objetivo:
Realizar login contra la API y guardar el token JWT.

Tareas:
1. Crear formulario de login.
2. Enviar POST a https://localhost:52025/api/v1/auth/login.
3. Si el login es correcto, guardar accessToken en localStorage.
4. Mostrar mensaje de éxito o error.
5. Añadir botón para borrar token.-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Login de usuarios</h1>
    <form action="#" id="loginForm">
        <div class="col-md-3">
            <label for="username" class="form-label">Usuario</label>
            <input type="text" name="username" id="username" class="form-control" required>

        </div>
        <div class="col-md-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div class="col-md-3">
             <button type="button" onclick="login()" class="btn btn-primary">Enviar</button>
        </div>
    </form>
    <button type="button" onclick="eliminarToken()">Borrar token</button>
    <script>
        var tokenGuardado;
        async function login() {
            var username = document.getElementById('username').value;
            var password= document.getElementById('password').value;
            try{
                const response = await fetch('https://localhost:52025/api/v1/auth/login',{
                    method:'POST',
                    headers:{
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        Username: username,
                        Password: password
                    })
                });

                if(response.ok){
                    const data = await response.json();
                    localStorage.setItem("jwtToken",data.accessToken);
                    console.log(localStorage);
                    console.log("Token guardado con exito");
                    tokenGuardado = data.accessToken;
                    document.getElementById("loginForm").reset();
                    return true;
                }else{
                    console.error('Error en el login:', response.statusText);
                    return false;
                }
            }catch(error){
                console.error('Error de red:', error);
                return false;
            }
            
        }

        function eliminarToken(){
            localStorage.removeItem("jwtToken",tokenGuardado);
            console.log(localStorage);
        }
    </script>
</body>
</html>
